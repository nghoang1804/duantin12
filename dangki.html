<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký tham gia</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<h1>Form đăng ký tham gia ngày hội tri ân</h1>
</header>

<nav>
<a href="index.html">Trang chủ</a>
<a href="dangki.html">Đăng ký</a>
<a href="hoatdong.html">Hoạt động</a>
</nav>

<section class="card">

<h2>Thông tin cá nhân</h2>

<form class="form-dangki">

<label>Họ và tên:</label>
<input type="text" name="hoten" placeholder="Nhập họ và tên..." required>

<label>Lớp:</label>
<select name="lop">
<option>12TN1</option>
<option>12TN2</option>
<option>12TN3</option>
<option>12TN4</option>
<option>12TN5</option>
<option>12TN6</option>
<option>12TN7</option>
<option>12TN8</option>
<option>12HS1</option>
<option>12HS2</option>
<option>12L</option>
<option>12T</option>
<option>12XH1</option>
<option>12XH2</option>
<option>12CV</option>
<option>12CL</option>
<option>12CT</option>
<option>12CA</option>
<option>12CH</option>
</select>

<label>Giới tính:</label>

<div class="option-group">

<label class="option">
<input type="radio" name="gioitinh"> Nam
</label>

<label class="option">
<input type="radio" name="gioitinh"> Nữ
</label>

</div>

<label>Hoạt động muốn tham gia:</label>

<div class="option-group">

<label class="option">
<input type="checkbox" name="hd"> Chụp ảnh kỉ yếu
</label>

<label class="option">
<input type="checkbox" name="hd"> Văn nghệ
</label>

<label class="option">
<input type="checkbox" name="hd"> Trò chơi tập thể
</label>

</div>

<label>Lời nhắn gửi:</label>

<textarea name="loinhan" placeholder="Nhập lời nhắn..." rows="5"></textarea>

<div class="form-button">
<button type="submit">Gửi đăng ký</button>
<button type="reset">Nhập lại</button>
</div>

</form>

</section>

<footer>
<p>Dự án Tin học 12 – Kiểm tra giữa kì 2</p>
</footer>

</body>
</html>
